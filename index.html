<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pasja — Digital Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-green:  #39ff14;
      --neon-cyan:   #00f5ff;
      --neon-pink:   #ff2d78;
      --neon-amber:  #ffb700;
      --neon-purple: #bf5fff;
      --bg-dark:     #050508;
      --border-glow: rgba(0,245,255,0.25);
      --text-main:   #e8eaf6;
      --text-dim:    #7986a3;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { width: 100%; height: 100%; overflow: hidden; background: #000; }

    body {
      width: 1920px; height: 1080px;
      overflow: hidden;
      background: var(--bg-dark);
      font-family: 'Rajdhani', sans-serif;
      color: var(--text-main);
      transform-origin: top left;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none; z-index: 999;
    }

    .grid-bg {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift { 0% { background-position: 0 0; } 100% { background-position: 60px 60px; } }

    .glow-tl, .glow-br {
      position: fixed; width: 600px; height: 600px;
      border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(120px); opacity: 0.12;
    }
    .glow-tl { top: -200px; left: -200px; background: var(--neon-cyan); }
    .glow-br { bottom: -200px; right: -200px; background: var(--neon-pink);
      animation: pulseBR 5s ease-in-out infinite alternate; }
    @keyframes pulseBR { from { opacity: 0.08; } to { opacity: 0.18; } }

    header {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 52px 16px;
      border-bottom: 1px solid var(--border-glow);
      box-shadow: 0 1px 30px rgba(0,245,255,0.08);
    }
    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 3rem; font-weight: 900; letter-spacing: 0.25em;
      color: var(--neon-cyan);
      text-shadow: 0 0 10px var(--neon-cyan), 0 0 30px rgba(0,245,255,0.5);
      animation: flicker 8s infinite;
    }
    @keyframes flicker {
      0%,95%,100% { opacity: 1; }
      96% { opacity: 0.7; } 97% { opacity: 1; } 98% { opacity: 0.6; }
    }
    .header-tagline { font-size: 1.1rem; letter-spacing: 0.35em; color: var(--text-dim); }
    .header-time {
      font-family: 'Orbitron', monospace;
      font-size: 2rem; font-weight: 700;
      color: var(--neon-amber); text-shadow: 0 0 8px var(--neon-amber);
    }

    #app {
      position: relative; z-index: 10;
      display: grid;
      grid-template-columns: 250px 1fr 1fr 1fr 1fr;
      height: calc(1080px - 73px - 36px);
    }

    aside {
      padding: 18px 14px;
      border-right: 1px solid var(--border-glow);
      display: flex; flex-direction: column; gap: 6px;
      overflow: hidden;
    }
    .aside-title {
      font-family: 'Orbitron', monospace;
      font-size: 0.85rem; letter-spacing: 0.25em; color: var(--text-dim);
      margin-bottom: 4px; padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .brand-item { display: flex; align-items: center; gap: 10px; font-size: 1.15rem; font-weight: 600; padding: 5px 0; }
    .brand-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
    .ticker-wrap { margin-top: auto; border-top: 1px solid var(--border-glow); padding-top: 12px; }
    .ticker-label {
      font-family: 'Orbitron', monospace; font-size: 0.78rem; letter-spacing: 0.25em;
      color: var(--neon-green); margin-bottom: 6px; text-shadow: 0 0 6px var(--neon-green);
    }
    .ticker { font-size: 1rem; color: var(--text-dim); line-height: 1.7; }
    .ticker span { color: var(--neon-amber); font-weight: 600; }

    .menu-col {
      border-right: 1px solid var(--border-glow);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .menu-col:last-child { border-right: none; }

    .cat-block { flex-shrink: 0; padding: 13px 16px 6px; }
    .cat-block + .cat-block { border-top: 1px solid rgba(255,255,255,0.07); }

    .cat-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.05rem; font-weight: 700; letter-spacing: 0.14em;
      margin-bottom: 7px;
      display: flex; align-items: center; gap: 10px;
    }
    .cat-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, currentColor, transparent); opacity: 0.35;
    }
    .cc0 { color: var(--neon-green);  text-shadow: 0 0 10px rgba(57,255,20,0.6); }
    .cc1 { color: var(--neon-cyan);   text-shadow: 0 0 10px rgba(0,245,255,0.6); }
    .cc2 { color: var(--neon-pink);   text-shadow: 0 0 10px rgba(255,45,120,0.6); }
    .cc3 { color: var(--neon-amber);  text-shadow: 0 0 10px rgba(255,183,0,0.6); }
    .cc4 { color: var(--neon-purple); text-shadow: 0 0 10px rgba(191,95,255,0.6); }

    .tbl-head {
      display: grid;
      font-family: 'Orbitron', monospace; font-size: 0.75rem; letter-spacing: 0.08em;
      color: var(--text-dim);
      padding: 0 4px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 1px;
    }
    .tbl-head span { text-align: right; }
    .tbl-head span:first-child { text-align: left; }

    .prod-row {
      display: grid; align-items: center;
      min-height: 30px; padding: 2px 4px; border-radius: 3px;
      transition: background 0.15s;
    }
    .prod-row:hover { background: rgba(0,245,255,0.05); }
    .prod-row:hover .prod-name { color: var(--neon-cyan); }

    .prod-name {
      display: flex; align-items: center; gap: 6px;
      font-size: 1.08rem; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color 0.15s;
    }
    .prod-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .prod-price {
      font-family: 'Orbitron', monospace; font-size: 1rem; font-weight: 700;
      text-align: right; color: var(--neon-amber);
      text-shadow: 0 0 5px rgba(255,183,0,0.5);
    }
    .prod-price.empty { color: rgba(255,255,255,0.1); font-size: 0.75rem; }

    .badge-new {
      display: inline-flex; align-items: center;
      font-family: 'Orbitron', monospace; font-size: 0.6rem; font-weight: 900;
      padding: 2px 5px; border-radius: 2px;
      background: var(--neon-green); color: #000; margin-left: 3px; flex-shrink: 0;
      animation: newPulse 2.5s ease-in-out infinite;
    }
    @keyframes newPulse {
      0%,100% { box-shadow: 0 0 4px var(--neon-green); }
      50% { box-shadow: 0 0 10px var(--neon-green), 0 0 20px rgba(57,255,20,0.4); }
    }
    .badge-sale {
      display: inline-flex; align-items: center;
      font-family: 'Orbitron', monospace; font-size: 0.6rem; font-weight: 900;
      padding: 2px 5px; border-radius: 2px;
      background: var(--neon-pink); color: #fff; margin-left: 3px; flex-shrink: 0;
      animation: salePulse 2.5s ease-in-out infinite;
    }
    @keyframes salePulse {
      0%,100% { box-shadow: 0 0 4px var(--neon-pink); }
      50% { box-shadow: 0 0 10px var(--neon-pink), 0 0 20px rgba(255,45,120,0.4); }
    }

    .soon-text {
      font-family: 'Orbitron', monospace; font-size: 0.85rem; letter-spacing: 0.25em;
      color: var(--text-dim); text-align: center; padding: 8px 0;
    }
    .loading-msg {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--text-dim);
      font-family: 'Orbitron', monospace; font-size: 0.65rem; letter-spacing: 0.2em;
      animation: loadPulse 1.5s ease-in-out infinite;
    }
    @keyframes loadPulse { 0%,100%{opacity:0.3;} 50%{opacity:1;} }

    footer {
      position: fixed; bottom: 0; left: 0; right: 0; height: 36px;
      background: rgba(5,5,8,0.97);
      border-top: 1px solid var(--border-glow);
      display: flex; align-items: center;
      padding: 0 48px; z-index: 100; gap: 20px;
      box-shadow: 0 -1px 20px rgba(0,245,255,0.08);
    }
    .footer-label {
      font-family: 'Orbitron', monospace; font-size: 0.78rem; letter-spacing: 0.2em;
      color: var(--neon-cyan); text-shadow: 0 0 6px var(--neon-cyan); flex-shrink: 0;
    }
    .brand-pills { display: flex; gap: 12px; }
    .brand-pill { display: flex; align-items: center; gap: 5px; font-size: 0.95rem; font-weight: 600; }
    .brand-pill-dot { width: 7px; height: 7px; border-radius: 50%; }
    .footer-right {
      margin-left: auto; font-family: 'Orbitron', monospace;
      font-size: 0.75rem; letter-spacing: 0.18em; color: var(--text-dim);
    }
  </style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-tl"></div>
<div class="glow-br"></div>

<header>
  <div>
    <div class="logo-text">PASJA</div>
    <div class="header-tagline">Amsterdam · Premium Cannabis Menu</div>
  </div>
  <div style="text-align:center;">
    <div style="font-size:0.85rem;letter-spacing:0.25em;color:var(--text-dim);margin-bottom:4px;">QUALITY SELECTION</div>
    <div style="display:flex;gap:16px;align-items:center;">
      <div>
        <div style="font-family:'Orbitron',monospace;font-size:1.3rem;color:var(--neon-green);text-shadow:0 0 8px var(--neon-green);">LIVE</div>
        <div style="font-size:0.72rem;letter-spacing:0.15em;color:var(--text-dim);">MENU</div>
      </div>
      <div style="width:1px;height:28px;background:var(--border-glow);"></div>
      <div>
        <div style="font-family:'Orbitron',monospace;font-size:1.3rem;color:var(--neon-amber);text-shadow:0 0 8px var(--neon-amber);">18+</div>
        <div style="font-size:0.72rem;letter-spacing:0.15em;color:var(--text-dim);">ONLY</div>
      </div>
    </div>
  </div>
  <div class="header-time" id="clock">--:--</div>
</header>

<div id="app">
  <aside>
    <div class="aside-title">Brands</div>
    <div id="sidebar-brands"><div class="loading-msg" style="height:auto;padding:8px 0;font-size:0.58rem;">...</div></div>
    <div class="ticker-wrap">
      <div class="ticker-label">// INFO</div>
      <div class="ticker">
        Max <span>5 GR</span> per bezoek<br>
        Alleen voor <span>18+</span><br>
        Geen alcohol & cannabis<br>
        Geniet verantwoord
      </div>
    </div>
  </aside>
  <div class="menu-col" id="col-1"><div class="loading-msg">Yükleniyor...</div></div>
  <div class="menu-col" id="col-2"></div>
  <div class="menu-col" id="col-3"></div>
  <div class="menu-col" id="col-4"></div>
</div>

<footer>
  <div class="footer-label">// BRANDS</div>
  <div class="brand-pills" id="footer-brands"></div>
  <div class="footer-right">PASJA REVIEW · AMSTERDAM · 18+</div>
</footer>

<script>
  /* ══════════════════════════════════════════
   *  CONFIG
   * ══════════════════════════════════════════ */
  const BASE_URL  = 'https://script.google.com/macros/s/AKfycbzVO1YH0O5qgk9rSiFr0Lcc3uojOeHJiNWlLE04i5Ampc-e4zmLOocy5-QorgowvJnz/exec';
  const MENU_URL  = BASE_URL;
  const RENK_URL  = BASE_URL + '?action=renkler';
  const SIRA_URL  = BASE_URL + '?action=sirala';
  const UPDATE_MS = 10000; // 10 sn

  /* Kategori renk sınıfları — sırayla dönüyor */
  const CAT_COLORS = ['cc0','cc1','cc2','cc3','cc4'];
  let colorIdx = 0;

  /* ── Fiyat formatla ── */
  function fmt(v) {
    if (v === undefined || v === null || v === 0 || v === '') return null;
    return `€${v}`;
  }

  /* ── Fetch ── */
  async function fetchJSON(url) {
    const r = await fetch(url, { cache: 'no-store' });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  /* ── Kategori tipine göre sütun config ── */
  function getConfig(kat) {
    const u = kat.toUpperCase();
    // JOINT önce kontrol edilmeli — "WEED JOINTS" WEED dalına girmesin
    if (u.includes('JOINT')) return {
      headers : ['Product','1ST','5ST','10ST','15ST'],
      grid    : '1fr 50px 50px 58px 58px',
      keys    : ['fiyat_1gr','thc_orani','fiyat_5gr','fiyat_4']
    };
    if (u.includes('WEED')) return {
      headers : ['Product','1GR','2.5GR','5GR'],
      grid    : '1fr 64px 64px 64px',
      keys    : ['fiyat_1gr','thc_orani','fiyat_5gr']
    };
    if (u.includes('EDIBLE')) return {
      headers : ['Product','1ST','5ST','10ST'],
      grid    : '1fr 64px 64px 64px',
      keys    : ['fiyat_1gr','thc_orani','fiyat_5gr']
    };
    if (u.includes('HASH')) return {
      headers : ['Product','0.5GR','1GR','5GR'],
      grid    : '1fr 64px 64px 64px',
      keys    : ['fiyat_1gr','thc_orani','fiyat_5gr']
    };
    if (u.includes('VAPE')) return {
      headers : ['Product','Flyat 1','Flyat 2'],
      grid    : '1fr 85px 85px',
      keys    : ['fiyat_1gr','fiyat_5gr']
    };
    return {
      headers : ['Product','Fiyat 1','Fiyat 2'],
      grid    : '1fr 85px 85px',
      keys    : ['fiyat_1gr','fiyat_5gr']
    };
  }

  /* ── Tek bir kategori bloğu oluştur ── */
  function buildBlock(kategori, urunler, renkler) {
    const cfg   = getConfig(kategori);
    const color = CAT_COLORS[colorIdx++ % CAT_COLORS.length];

    const headerCells = cfg.headers.map((h,i) =>
      `<span${i > 0 ? ' style="text-align:right"' : ''}>${h}</span>`
    ).join('');

    let rows = '';
    if (!urunler || urunler.length === 0) {
      rows = `<div class="soon-text">// SOON //</div>`;
    } else {
      rows = urunler.map(u => {
        const renk   = renkler[u.marka] || '#888';
        const badges = [
          u.yeni_mi === true ? '<span class="badge-new">NEW</span>' : '',
          (u.korting === true || u.korting === 'true' || u.korting === 1)
            ? '<span class="badge-sale">SALE</span>' : ''
        ].join('');

        const priceCells = cfg.keys.map(k => {
          const v = fmt(u[k]);
          return v
            ? `<div class="prod-price">${v}</div>`
            : `<div class="prod-price empty">—</div>`;
        }).join('');

        return `<div class="prod-row" style="grid-template-columns:${cfg.grid}">
          <div class="prod-name">
            <div class="prod-dot" style="background:${renk};box-shadow:0 0 4px ${renk}70;"></div>
            ${u.urun_adi || '?'}${badges}
          </div>
          ${priceCells}
        </div>`;
      }).join('');
    }

    return `<div class="cat-block">
      <div class="cat-title ${color}">${kategori}</div>
      <div class="tbl-head" style="grid-template-columns:${cfg.grid}">${headerCells}</div>
      ${rows}
    </div>`;
  }

  /* ── Ana render fonksiyonu ── */
  async function renderMenu() {
    colorIdx = 0;

    const [menuData, renkler, siralamaData] = await Promise.all([
      fetchJSON(MENU_URL),
      fetchJSON(RENK_URL),
      fetchJSON(SIRA_URL)
    ]);

    /* Kategorilere ürün doldur */
    const kategoriler = {};
    siralamaData.forEach(k => { if (k?.kategori) kategoriler[k.kategori] = []; });
    menuData.forEach(item => {
      if (item?.ana_kategori && Object.prototype.hasOwnProperty.call(kategoriler, item.ana_kategori) && item.stok_var_mi !== false) {
        kategoriler[item.ana_kategori].push(item);
      }
    });

    /* Sütun grupları */
    const cols = {};
    siralamaData.forEach(k => {
      if (k?.sutun_no && k.sira_no && k.kategori) {
        if (!cols[k.sutun_no]) cols[k.sutun_no] = [];
        cols[k.sutun_no].push({ kategori: k.kategori, sira: k.sira_no });
      }
    });

    const sorted = Object.keys(cols).sort((a,b) => +a - +b);

    sorted.forEach((sutunNo, idx) => {
      const el = document.getElementById(`col-${idx + 1}`);
      if (!el) return;
      const kats = cols[sutunNo].sort((a,b) => a.sira - b.sira);
      el.innerHTML = kats.map(({ kategori }) =>
        buildBlock(kategori, kategoriler[kategori], renkler)
      ).join('');
    });

    /* Sidebar & footer markalar */
    const markalar = [...new Set(menuData.map(i => i.marka).filter(Boolean))].sort();

    document.getElementById('sidebar-brands').innerHTML = markalar.map(m => {
      const r = renkler[m] || '#888';
      return `<div class="brand-item">
        <div class="brand-dot" style="background:${r};box-shadow:0 0 5px ${r}80;"></div>
        ${m}
      </div>`;
    }).join('');

    document.getElementById('footer-brands').innerHTML = markalar.map(m => {
      const r = renkler[m] || '#888';
      return `<div class="brand-pill">
        <div class="brand-pill-dot" style="background:${r};box-shadow:0 0 5px ${r};"></div>
        ${m}
      </div>`;
    }).join('');
  }

  /* ── Saat ── */
  function tick() {
    const n = new Date();
    document.getElementById('clock').textContent =
      String(n.getHours()).padStart(2,'0') + ':' + String(n.getMinutes()).padStart(2,'0');
  }

  /* ── Scale ── */
  function scaleMenu() {
    const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
    document.body.style.transform = `scale(${s})`;
    document.body.style.marginLeft = (window.innerWidth  - 1920 * s) / 2 + 'px';
    document.body.style.marginTop  = (window.innerHeight - 1080 * s) / 2 + 'px';
  }

  /* ── Bootstrap ── */
  scaleMenu();
  window.addEventListener('resize', scaleMenu);
  tick();
  setInterval(tick, 1000);
  renderMenu().catch(console.error);
  setInterval(() => renderMenu().catch(console.error), UPDATE_MS);
</script>

</body>
</html>
